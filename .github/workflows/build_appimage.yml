name: Build AppImage

on:
  push:
    tags:
      - "*"

jobs:
  build-appimage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y python3 python3-pip python3-venv patchelf fuse

      - name: Install PyInstaller
        run: |
          pip install pyinstaller

      - name: Build binary with PyInstaller
        run: |
          pyinstaller --onefile launcher_linux.py --name YTDownloader

      - name: Prepare AppDir
        run: |
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons

          cp dist/YTDownloader AppDir/usr/bin/
          cp YTDownloader.desktop AppDir/usr/share/applications/
          cp YTDownloader.png AppDir/usr/share/icons/

      - name: Create AppRun
        run: |
          cat > AppDir/AppRun << 'EOF'
          #!/bin/bash
          HERE="$(dirname "$(readlink -f "$0")")"
          exec "$HERE/usr/bin/YTDownloader"
          EOF
          chmod +x AppDir/AppRun

      - name: Download appimagetool
        run: |
          wget https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage

      - name: Build AppImage
        run: |
          ./appimagetool-x86_64.AppImage AppDir YTDownloader-x86_64.AppImage

      - name: Upload AppImage to release
        uses: softprops/action-gh-release@v2
        with:
          files: YTDownloader-x86_64.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
