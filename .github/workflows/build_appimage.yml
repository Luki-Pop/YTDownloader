name: Build Linux Packages

on:
  push:
    tags:
      - "*"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y python3 python3-pip python3-venv patchelf fuse dos2unix

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build binary with PyInstaller
        run: |
          pyinstaller --onefile launcher_linux.py --name YTDownloader
          ls -l dist/

      # -------------------------------
      # FIX DESKTOP FILE (Windows → Linux)
      # -------------------------------
      - name: Fix desktop file encoding and permissions
        run: |
          echo "Before conversion:"
          file YTDownloader.desktop || true

          dos2unix YTDownloader.desktop || true
          sed -i 's/\r$//' YTDownloader.desktop
          chmod 644 YTDownloader.desktop

          echo "After conversion:"
          file YTDownloader.desktop

          echo "Desktop file content:"
          cat -n YTDownloader.desktop

      # -------------------------------
      # Prepare AppDir
      # -------------------------------
      
      - name: Prepare AppDir
        run: |
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons

          cp dist/YTDownloader AppDir/usr/bin/

        # Coy .desktop in two places
          cp YTDownloader.desktop AppDir/usr/share/applications/
          cp YTDownloader.desktop AppDir/YTDownloader.desktop

          cp YTDownloader.png AppDir/usr/share/icons/

      # -------------------------------
      # DEBUG AppDir
      # -------------------------------
      - name: DEBUG — verify AppDir contents
        run: |
          echo "--- Applications folder ---"
          ls -l AppDir/usr/share/applications || true

          echo "--- Top-level AppDir ---"
          ls -l AppDir || true

          echo "--- Desktop file content in AppDir ---"
          cat -n AppDir/YTDownloader.desktop || true

      # -------------------------------
      # Create AppRun
      # -------------------------------
      - name: Create AppRun
        run: |
          cat > AppDir/AppRun << 'EOF'
          #!/bin/bash
          HERE="$(dirname "$(readlink -f "$0")")"
          exec "$HERE/usr/bin/YTDownloader"
          EOF
          chmod +x AppDir/AppRun

      # -------------------------------
      # Download appimagetool
      # -------------------------------
      - name: Download appimagetool
        run: |
          wget https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage

      # -------------------------------
      # Build AppImage
      # -------------------------------
      - name: Build AppImage
        run: |
          APPIMAGETOOL_VERBOSE=1 ./appimagetool-x86_64.AppImage AppDir YTDownloader-x86_64.AppImage

      # -------------------------------
      # Upload release assets
      # -------------------------------
      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            YTDownloader-x86_64.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
