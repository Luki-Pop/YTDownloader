name: Build AppImage

on:
  push:
    tags:
      - "*"

jobs:
  build-appimage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y python3 python3-venv python3-pip patchelf fuse

      - name: Create Python venv
        run: |
          python3 -m venv venv
          source venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare AppDir structure
        run: |
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/lib
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons

      - name: Copy application files
        run: |
          cp launcher_linux.py AppDir/
          cp YTDownloader.desktop AppDir/usr/share/applications/
          cp YTDownloader.png AppDir/usr/share/icons/
          cp -r venv/lib/python3.10 AppDir/usr/lib/python3.10
          cp -r venv/bin AppDir/usr/bin

      - name: Create AppRun
        run: |
          cat > AppDir/AppRun << 'EOF'
          #!/bin/bash
          HERE="$(dirname "$(readlink -f "$0")")"
          export PYTHONHOME="$HERE/usr"
          export PYTHONPATH="$HERE/usr/lib/python3.10/site-packages"
          export PATH="$HERE/usr/bin:$PATH"
          exec "$HERE/launcher_linux.py"
          EOF
          chmod +x AppDir/AppRun

      - name: Download appimagetool
        run: |
          wget https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage

      - name: Build AppImage
        run: |
          ./appimagetool-x86_64.AppImage AppDir YTDownloader-x86_64.AppImage

      - name: Upload AppImage to release
        uses: softprops/action-gh-release@v2
        with:
          files: YTDownloader-x86_64.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
