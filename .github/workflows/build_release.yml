name: Build Linux Packages

on:
  push:
    tags:
      - "*"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y python3 python3-pip python3-venv patchelf fuse dos2unix fakeroot dpkg-dev

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build binary with PyInstaller
        run: |
          pyinstaller --onefile launcher_linux.py --name YTDownloader
          ls -l dist/

      # -------------------------------
      # FIX DESKTOP FILE (Windows → Linux)
      # -------------------------------
      - name: Fix desktop file encoding and permissions
        run: |
          echo "Before conversion:"
          file YTDownloader.desktop || true

          dos2unix YTDownloader.desktop || true
          sed -i 's/\r$//' YTDownloader.desktop
          chmod 644 YTDownloader.desktop

          echo "After conversion:"
          file YTDownloader.desktop

          echo "Desktop file content:"
          cat -n YTDownloader.desktop

      # -------------------------------
      # Build DEB package
      # -------------------------------
      - name: Build DEB package
        run: |
          mkdir -p deb/DEBIAN
          mkdir -p deb/usr/bin
          mkdir -p deb/usr/share/applications
          mkdir -p deb/usr/share/icons

          cp dist/YTDownloader deb/usr/bin/
          cp YTDownloader.desktop deb/usr/share/applications/
          cp YTDownloader.png deb/usr/share/icons/

          cat > deb/DEBIAN/control << EOF
          Package: yt-downloader
          Version: 1.0
          Section: utils
          Priority: optional
          Architecture: amd64
          Maintainer: ${{ github.actor }}
          Description: YTDownloader - YouTube video downloader
          EOF

          dpkg-deb --build deb
          mv deb.deb YTDownloader.deb

      # -------------------------------
      # Build tar.gz package
      # -------------------------------
      - name: Build tar.gz package
        run: |
          mkdir -p package_tar/YTDownloader
          cp dist/YTDownloader package_tar/YTDownloader/
          cp YTDownloader.desktop package_tar/YTDownloader/
          cp YTDownloader.png package_tar/YTDownloader/
          tar -czvf YTDownloader.tar.gz -C package_tar YTDownloader

      # -------------------------------
      # Prepare AppDir for AppImage
      # -------------------------------
      - name: Prepare AppDir
        run: |
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons

          cp dist/YTDownloader AppDir/usr/bin/

          # Desktop file in two locations (required by AppImageKit)
          cp YTDownloader.desktop AppDir/usr/share/applications/
          cp YTDownloader.desktop AppDir/YTDownloader.desktop

          # Icon in two locations (required by AppImageKit)
          cp YTDownloader.png AppDir/usr/share/icons/
          cp YTDownloader.png AppDir/

      # -------------------------------
      # DEBUG AppDir
      # -------------------------------
      - name: DEBUG — verify AppDir contents
        run: |
          echo "--- Applications folder ---"
          ls -l AppDir/usr/share/applications || true

          echo "--- Top-level AppDir ---"
          ls -l AppDir || true

          echo "--- Desktop file content in AppDir ---"
          cat -n AppDir/YTDownloader.desktop || true

      # -------------------------------
      # Create AppRun
      # -------------------------------
      - name: Create AppRun
        run: |
          cat > AppDir/AppRun << 'EOF'
          #!/bin/bash
          HERE="$(dirname "$(readlink -f "$0")")"
          exec "$HERE/usr/bin/YTDownloader"
          EOF
          chmod +x AppDir/AppRun

      # -------------------------------
      # Download appimagetool
      # -------------------------------
      - name: Download appimagetool
        run: |
          wget https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage

      # -------------------------------
      # Build AppImage
      # -------------------------------
      - name: Build AppImage
        run: |
          APPIMAGETOOL_VERBOSE=1 ./appimagetool-x86_64.AppImage AppDir YTDownloader-x86_64.AppImage

      # -------------------------------
      # Upload release assets
      # -------------------------------
      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            YTDownloader-x86_64.AppImage
            YTDownloader.deb
            YTDownloader.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
