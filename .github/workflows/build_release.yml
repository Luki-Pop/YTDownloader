name: Build Linux Packages

on:
  push:
    tags:
      - "*"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y python3 python3-pip python3-venv patchelf fuse dos2unix fakeroot dpkg-dev rpm

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build binary with PyInstaller
        run: |
          pyinstaller --onefile launcher_linux.py --name YTDownloader
          ls -l dist/

      # -------------------------------
      # FIX DESKTOP FILE (Windows → Linux)
      # -------------------------------
      - name: Fix desktop file encoding and permissions
        run: |
          dos2unix YTDownloader.desktop || true
          sed -i 's/\r$//' YTDownloader.desktop
          chmod 644 YTDownloader.desktop
          file YTDownloader.desktop
          cat -n YTDownloader.desktop

      # -------------------------------
      # Build DEB package
      # -------------------------------
      - name: Build DEB package
        run: |
          mkdir -p deb/DEBIAN
          mkdir -p deb/usr/bin
          mkdir -p deb/usr/share/applications
          mkdir -p deb/usr/share/icons

          cp dist/YTDownloader deb/usr/bin/
          cp YTDownloader.desktop deb/usr/share/applications/
          cp YTDownloader.png deb/usr/share/icons/

          cat > deb/DEBIAN/control << EOF
          Package: yt-downloader
          Version: 1.0
          Section: utils
          Priority: optional
          Architecture: amd64
          Maintainer: ${{ github.actor }}
          Description: YTDownloader - YouTube video downloader
          EOF

          dpkg-deb --build deb
          mv deb.deb YTDownloader.deb

      # -------------------------------
      # Build RPM package
      # -------------------------------
      - name: Build RPM package
        run: |
          mkdir -p rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}

          cp dist/YTDownloader rpmbuild/SOURCES/
          cp YTDownloader.desktop rpmbuild/SOURCES/
          cp YTDownloader.png rpmbuild/SOURCES/

          cat > rpmbuild/SPECS/yt-downloader.spec << EOF
          Name:           yt-downloader
          Version:        1.0
          Release:        1%{?dist}
          Summary:        YTDownloader - YouTube video downloader
          License:        MIT
          URL:            https://github.com/Luki-Pop/YTDownloader
          Source0:        YTDownloader
          Source1:        YTDownloader.desktop
          Source2:        YTDownloader.png
          BuildArch:      x86_64

          %description
          YTDownloader - YouTube video downloader.

          %install
          mkdir -p %{buildroot}/usr/bin
          mkdir -p %{buildroot}/usr/share/applications
          mkdir -p %{buildroot}/usr/share/icons

          install -m 755 %{SOURCE0} %{buildroot}/usr/bin/YTDownloader
          install -m 644 %{SOURCE1} %{buildroot}/usr/share/applications/YTDownloader.desktop
          install -m 644 %{SOURCE2} %{buildroot}/usr/share/icons/YTDownloader.png

          %files
          /usr/bin/YTDownloader
          /usr/share/applications/YTDownloader.desktop
          /usr/share/icons/YTDownloader.png

          %changelog
          EOF

          rpmbuild --define "_topdir $(pwd)/rpmbuild" -bb rpmbuild/SPECS/yt-downloader.spec

          cp rpmbuild/RPMS/x86_64/*.rpm YTDownloader.rpm

      # -------------------------------
      # Build tar.gz package
      # -------------------------------
      - name: Build tar.gz package
        run: |
          mkdir -p package_tar/YTDownloader
          cp dist/YTDownloader package_tar/YTDownloader/
          cp YTDownloader.desktop package_tar/YTDownloader/
          cp YTDownloader.png package_tar/YTDownloader/
          tar -czvf YTDownloader.tar.gz -C package_tar YTDownloader

      # -------------------------------
      # Generate PKGBUILD (Arch Linux)
      # -------------------------------
      - name: Generate PKGBUILD (Arch Linux)
        run: |
          mkdir -p archpkg
          cat > archpkg/PKGBUILD << 'EOF'
          pkgname=yt-downloader
          pkgver=1.0
          pkgrel=1
          pkgdesc="YTDownloader - YouTube video downloader"
          arch=('x86_64')
          url="https://github.com/Luki-Pop/YTDownloader"
          license=('MIT')
          source=('YTDownloader' 'YTDownloader.desktop' 'YTDownloader.png')
          sha256sums=('SKIP' 'SKIP' 'SKIP')

          package() {
              install -Dm755 "$srcdir/YTDownloader" "$pkgdir/usr/bin/YTDownloader"
              install -Dm644 "$srcdir/YTDownloader.desktop" "$pkgdir/usr/share/applications/YTDownloader.desktop"
              install -Dm644 "$srcdir/YTDownloader.png" "$pkgdir/usr/share/icons/YTDownloader.png"
          }
          EOF

          cp dist/YTDownloader archpkg/
          cp YTDownloader.desktop archpkg/
          cp YTDownloader.png archpkg/

          tar -czvf YTDownloader-archpkg.tar.gz -C archpkg .

      # -------------------------------
      # Prepare AppDir for AppImage
      # -------------------------------
      - name: Prepare AppDir
        run: |
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons

          cp dist/YTDownloader AppDir/usr/bin/

          cp YTDownloader.desktop AppDir/usr/share/applications/
          cp YTDownloader.desktop AppDir/YTDownloader.desktop

          cp YTDownloader.png AppDir/usr/share/icons/
          cp YTDownloader.png AppDir/

      - name: Create AppRun
        run: |
          cat > AppDir/AppRun << 'EOF'
          #!/bin/bash
          HERE="$(dirname "$(readlink -f "$0")")"
          exec "$HERE/usr/bin/YTDownloader"
          EOF
          chmod +x AppDir/AppRun

      - name: Download appimagetool
        run: |
          wget https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage

      - name: Build AppImage
        run: |
          APPIMAGETOOL_VERBOSE=1 ./appimagetool-x86_64.AppImage AppDir YTDownloader-x86_64.AppImage

      # -------------------------------
      # Upload release assets
      # -------------------------------
      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            YTDownloader-x86_64.AppImage
            YTDownloader.deb
            YTDownloader.rpm
            YTDownloader.tar.gz
            YTDownloader-archpkg.tar.gz
            YTDownloader-Installer.msi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
